services:
  - type: web
    name: sendsure
    runtime: rust
    plan: free
    # deploy/render is the stable live release branch; main is for development and refactoring.
    branch: deploy/render
    buildCommand: cargo build --release
    startCommand: ./target/release/sendsure-rust serve
    healthCheckPath: /health
    autoDeployTrigger: "off"
